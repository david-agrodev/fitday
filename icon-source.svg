<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo com bordas arredondadas (maskable safe zone = 80%) -->
  <rect width="512" height="512" rx="112" fill="#1E293B"/>

  <!-- Destaque laranja atrás -->
  <circle cx="256" cy="230" r="130" fill="#F97316" opacity="0.12"/>

  <!-- Ícone: figura correndo (estilizada) -->
  <!-- Cabeça -->
  <circle cx="290" cy="148" r="28" fill="#F97316"/>

  <!-- Corpo em movimento -->
  <!-- Tronco -->
  <line x1="278" y1="176" x2="248" y2="252" stroke="#F97316" stroke-width="18" stroke-linecap="round"/>

  <!-- Braço esquerdo (para trás) -->
  <line x1="268" y1="198" x2="220" y2="226" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>

  <!-- Braço direito (para frente) -->
  <line x1="262" y1="204" x2="310" y2="232" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>

  <!-- Perna esquerda (estendida à frente) -->
  <line x1="248" y1="252" x2="208" y2="312" stroke="#F97316" stroke-width="16" stroke-linecap="round"/>
  <line x1="208" y1="312" x2="170" y2="350" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>

  <!-- Perna direita (para trás) -->
  <line x1="248" y1="252" x2="296" y2="304" stroke="#F97316" stroke-width="16" stroke-linecap="round"/>
  <line x1="296" y1="304" x2="330" y2="345" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>

  <!-- Texto FITDay embaixo -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-weight="900" font-size="68" text-anchor="middle" fill="#FFFFFF" letter-spacing="-2">FIT<tspan fill="#F97316">Day</tspan></text>

  <!-- Linha decorativa -->
  <rect x="156" y="440" width="200" height="4" rx="2" fill="#F97316" opacity="0.5"/>
</svg>
